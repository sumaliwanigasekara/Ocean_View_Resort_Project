<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guests - Ocean View Resort</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
<div class="app-layout">
    <aside class="sidebar">
        <div class="sidebar-brand">
            <h1>🌊 Ocean View</h1>
            <span>Resort Management</span>
        </div>
        <nav class="sidebar-nav">
            <a href="dashboard.html" class="nav-link">📊 Dashboard</a>
            <a href="guests.html" class="nav-link active">👥 Guests</a>
            <a href="rooms.html" class="nav-link">🛏️ Rooms</a>
            <a href="reservations.html" class="nav-link">📅 Reservations</a>
            <a href="billing.html" class="nav-link">💳 Billing</a>
            <a href="reports.html" class="nav-link" data-role="MANAGER">📈 Reports</a>
            <a href="help.html" class="nav-link">📈 Help</a>
            <button id="logoutBtn" class="btn btn-logout">Logout</button>
        </nav>
    </aside>

    <main class="main-content">
        <header class="page-header">
            <div>
                <h1 class="page-title">Guests</h1>
                <p class="page-subtitle">Register and search guests</p>
            </div>
        </header>

        <div class="page-body">
            <div class="card">
                <div class="card-body">
                    <form id="guestForm">
                        <div class="form-group">
                            <label>Full Name</label>
                            <input type="text" id="guestName" class="form-control" required>
                        </div>
                        <div class="form-group">
                            <label>Email</label>
                            <input type="email" id="guestEmail" class="form-control" required>
                        </div>
                        <div class="form-group">
                            <label>Contact</label>
                            <input type="text" id="guestContact" class="form-control" required>
                        </div>
                        <div class="form-group">
                            <label>NIC</label>
                            <input type="text" id="guestNIC" class="form-control" required>
                        </div>
                        <div class="form-group">
                            <label>Passport</label>
                            <input type="text" id="guestPassport" class="form-control">
                        </div>
                        <div class="form-group">
                            <label>Address</label>
                            <input type="text" id="guestAddress" class="form-control">
                        </div>
                        <button type="submit" class="btn btn-primary">Save Guest</button>
                    </form>
                </div>
            </div>

            <div class="card mt-3">
                <div class="card-body">
                    <h3>Search Guests</h3>
                    <input type="text" id="searchTerm" class="form-control" placeholder="Name, email, passport, NIC">
                    <button class="btn btn-secondary mt-2" id="searchBtn">Search</button>
                    <div id="guestResults" class="mt-3"></div>
                </div>
            </div>
        </div>
    </main>
</div>

<script src="js/auth-guard.js"></script>
<script src="js/api.js"></script>
<script>
    (async () => {
    if (window.requireAuth && !(await window.requireAuth())) return;

    document.getElementById('guestForm').addEventListener('submit', async (e) => {
        e.preventDefault();

        const payload = {
            guestName: document.getElementById('guestName').value.trim(),
            guestEmail: document.getElementById('guestEmail').value.trim(),
            guestContact: document.getElementById('guestContact').value.trim(),
            guestNIC: document.getElementById('guestNIC').value.trim(),
            guestPassport: document.getElementById('guestPassport').value.trim(),
            guestAddress: document.getElementById('guestAddress').value.trim()
        };

        try {
            const response = await API.guests.create(payload);
            if (response && response.success) {
                alert(response.message || 'Guest saved');
                document.getElementById('guestForm').reset();
                document.getElementById('guestName').focus();
                return;
            }
            alert(response?.message || 'Failed to save guest');
        } catch {
            alert('Error saving guest');
        }
    });

    document.getElementById('searchBtn').addEventListener('click', async () => {
        const term = document.getElementById('searchTerm').value.trim();
        if (!term) return;

        const response = await API.guests.search(term);
        const list = response.data || [];
        const container = document.getElementById('guestResults');

        if (list.length === 0) {
            container.innerHTML = '<p>No guests found.</p>';
            return;
        }

        container.innerHTML = `
      <table class="table">
        <thead>
          <tr><th>ID</th><th>Name</th><th>Email</th><th>Contact</th></tr>
        </thead>
        <tbody>
          ${list.map(g => `
            <tr>
              <td>${g.guestId}</td>
              <td>${g.guestName}</td>
              <td>${g.guestEmail}</td>
              <td>${g.guestContact}</td>
            </tr>
          `).join('')}
        </tbody>
      </table>
    `;
    });
    document.getElementById('logoutBtn').addEventListener('click', async () => {
        const ctx = window.location.pathname.split('/')[1];
        const base = ctx && !ctx.includes('.') ? `/${ctx}` : '';

        try {
            await fetch(`${base}/api/auth/logout`, {
                method: 'POST',
                credentials: 'include'
            });
        } finally {
            window.location.href = 'index.html';
        }
    });

    })();
</script>
</body>
</html>
